# Medical RAG System - Docker Compose Configuration
# Usage:
#   docker-compose up -d
#   docker-compose down

version: '3.8'

services:
  # ============================================
  # Backend API Service
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: medical-rag-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-rag_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-rag_password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-medical_rag}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_started
    networks:
      - medical-rag-network
    volumes:
      - ../data:/app/data
      - ./logs:/app/logs

  # ============================================
  # Frontend Service (Nginx)
  # ============================================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: medical-rag-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - medical-rag-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

  # ============================================
  # MySQL Database
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: medical-rag-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_USER=${MYSQL_USER:-rag_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-rag_password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-medical_rag}
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - medical-rag-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ============================================
  # Milvus Vector Database
  # ============================================
  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: medical-rag-milvus
    restart: unless-stopped
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - medical-rag-network

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: medical-rag-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    networks:
      - medical-rag-network

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: medical-rag-minio
    restart: unless-stopped
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - minio_data:/minio
    command: minio server /minio
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - medical-rag-network

  # ============================================
  # Elasticsearch
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: medical-rag-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - TAKE_FILE_OWNERSHIP=true
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - medical-rag-network

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7.2-alpine
    container_name: medical-rag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - medical-rag-network

  # ============================================
  # Adminer (Database Management UI)
  # ============================================
  adminer:
    image: adminer:latest
    container_name: medical-rag-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
    depends_on:
      - mysql
    networks:
      - medical-rag-network

volumes:
  mysql_data:
  milvus_data:
  etcd_data:
  minio_data:
  elasticsearch_data:
  redis_data:

networks:
  medical-rag-network:
    driver: bridge
